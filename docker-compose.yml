services:
  resume-studio:
    build: .
    image: resume-studio:latest
    restart: unless-stopped
    # Bind to loopback by default; put Tailscale or a reverse proxy in front.
    ports:
      - '${BIND_ADDR:-127.0.0.1}:3000:3000'
    volumes:
      - ./data:/data
      # Seed files hold a real person's resume. Mounted, never baked into the image.
      - ./seed:/seed:ro
    environment:
      ORIGIN: ${ORIGIN:-http://localhost:3000}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS}
      AUTH_SECRET: ${AUTH_SECRET:-}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-sonnet-5}
      TYPST_TIMEOUT_MS: ${TYPST_TIMEOUT_MS:-20000}
      TYPST_CONCURRENCY: ${TYPST_CONCURRENCY:-2}

    # Typst evaluates user-authored markup. Bound it.
    mem_limit: 1g
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

    # --- Render-time network egress ---
    #
    # A `#import "@preview/…"` inside a résumé field makes Typst fetch that
    # package from its official registry. Verified bounds: only the `@preview`
    # namespace reaches the network (`@evil/pkg` is refused offline); a
    # `https://…` import resolves as a path *inside* the compile root, not a URL,
    # so it is not an SSRF; and the 20s `TYPST_TIMEOUT_MS` kills a slow fetch.
    # Any code that is pulled still renders confined to the throwaway `--root`.
    #
    # It is still an unwanted outbound request on user input. The Node process
    # needs egress (Google OAuth, the Anthropic API) and Typst runs as its child
    # in the same network namespace, so egress cannot be split in-process.
    # Deny it at the edge instead — allowlist api.anthropic.com and Google's
    # OAuth/JWKS hosts on your firewall or reverse proxy, and drop the rest. If
    # this instance uses neither OAuth-over-egress nor chat, cut it off entirely:
    #
    #   networks: [no-egress]
    #
    # networks:
    #   no-egress:
    #     internal: true
