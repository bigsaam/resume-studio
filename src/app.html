<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Resume Studio</title>
		<!--
			Stamp the theme class before first paint so there's no flash of the
			wrong palette. Explicit choice wins; otherwise follow the OS.
			(Do not name SvelteKit's head placeholder in this comment — it gets
			substituted here too, which breaks out of the comment.)
		-->
		<script>
			(function () {
				try {
					var t = localStorage.getItem('theme');
					if (t !== 'light' && t !== 'dark') {
						t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
					}
					document.documentElement.classList.add(t);
				} catch (e) {
					document.documentElement.classList.add('light');
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-bg text-fg">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
